<!DOCTYPE html>
<html lang="en-AU" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
            content="Professional computer science portfolio showcasing my various projects, and experiences.">
        <meta name="theme-color" content="#0066CC">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/style.css">
        <title>Alexander (Alex) Davidson | Computer Scientist Portfolio</title>
    </head>

    <body>
        <main class="portfolio-container">
            <h1>Courses</h1>
            <div class="course-card" th:each="course : ${courses}">
                <div class="course-header">
                    <span class="course-code"
                        th:text="${course.courseCode}">COSC2626</span>
                    <span class="course-date"
                        th:text="${course.completionDate}">Jun 2026</span>
                </div>
                <h3 class="course-name" th:text="${course.courseName}">Cloud
                    Computing</h3>
            </div>
        </main>
    </body>

</html>
